name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: cargo fmt
      run: cargo fmt -- --check

    - name: cargo clippy
      run: cargo clippy -- -D warnings

  test:

    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
    - uses: actions/checkout@v4

    - name: Set up Rust cache
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Cache Python test venv
      uses: actions/cache@v4
      with:
        path: tests/.test-venv
        key: ${{ runner.os }}-test-venv-${{ hashFiles('tests/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-test-venv-

    - name: Install cargo-nextest
      uses: taiki-e/install-action@v2
      with:
        tool: cargo-nextest

    - name: Setup test environment
      run: ./tests/setup_test_env.sh

    - name: Build
      run: cargo build --verbose

    - name: Run all tests
      # nextest: covers all test binaries in one command.
      # Serial execution for integration_connect_mode is declared in .config/nextest.toml
      # (test-groups.live-server), replacing the old -- --test-threads=1 CLI flag.
      # fail-fast=true (nextest default): first failure stops the run, so the
      # aaa_server_must_be_available sentinel correctly gates all connect-mode tests.
      run: cargo nextest run --profile ci

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: junit-results
        path: target/nextest/ci/junit.xml

  test-windows:
    name: Test (Windows)
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
    - uses: actions/checkout@v4

    - name: Set up Rust cache
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Install cargo-nextest
      uses: taiki-e/install-action@v2
      with:
        tool: cargo-nextest

    - name: Run unit tests (kernel discovery)
      # Integration tests require a Unix shell setup script; run unit tests only.
      # This verifies Windows-specific #[cfg(target_os = "windows")] code paths compile
      # and that kernel directory logic is correct on Windows.
      run: cargo nextest run --bins --profile ci
