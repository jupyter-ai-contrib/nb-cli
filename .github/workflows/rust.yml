name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: cargo fmt
      run: cargo fmt -- --check

    - name: cargo clippy
      run: cargo clippy -- -D warnings

  test:
    name: test local
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Rust cache
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Cache Python test venv
      uses: actions/cache@v4
      with:
        path: tests/.test-venv
        key: ${{ runner.os }}-test-venv-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-test-venv-

    - name: Setup test environment
      run: ./tests/setup_test_env.sh

    - name: Build
      run: cargo build --verbose

    - name: Run tests
      run: |
        echo "Running all tests..."
        cargo test --test integration_local_mode --verbose
        cargo test --test integration_execution --verbose
        cargo test --bins --verbose
        echo "✅ All tests passed!"

    # Connect-mode tests against jupyter-server-documents are not run in CI: they
    # are known-flaky against that backend (tracked separately as #87/#90/#97),
    # out of scope for this job. See the test-connect-collab job below for the
    # jupyter-collaboration backend, which has its own pinned venv.
    #
    # - name: Run connect-mode tests (jupyter-server-documents)
    #   run: NB_TEST_BACKEND=jsd cargo test --test integration_connect_mode -- --test-threads=1

  test-connect-collab:
    name: test connect (jupyter-collaboration)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # This job blocks: the 2 tests with a known, unrelated pre-existing issue
    # (jupyter-ai-contrib/nb-cli#100, a read-after-write race in
    # jupyter_server_ydoc's save debounce, not a PR #99-scoped regression) are
    # marked #[ignore] in the test source rather than made non-blocking here,
    # so the execute/restart tests this backend actually cares about gate CI.

    steps:
    - uses: actions/checkout@v4

    - name: Set up Rust cache
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Cache jupyter-collaboration test venv
      uses: actions/cache@v4
      with:
        path: tests/.test-venv-collab
        key: ${{ runner.os }}-test-venv-collab-jupyter-collaboration-4.4.1

    - name: Setup test environment (jupyter-collaboration)
      run: ./tests/setup_test_env.sh jupyter-collaboration

    - name: Build
      run: cargo build --verbose

    - name: Run connect-mode tests (jupyter-collaboration)
      run: NB_TEST_BACKEND=jupyter-collaboration cargo test --test integration_connect_mode -- --test-threads=1

  test-windows:
    name: test local (windows)
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Rust cache
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Install Rust target
      run: rustup target add x86_64-pc-windows-msvc

    - name: Build release binary
      run: cargo build --release --target x86_64-pc-windows-msvc

    - name: Run unit tests (kernel discovery)
      # Integration tests require a Unix shell setup script; run unit tests only.
      # This verifies Windows-specific #[cfg(target_os = "windows")] code paths compile
      # and that kernel directory logic is correct on Windows.
      run: cargo test --bins --verbose

    - name: Upload Windows binary
      uses: actions/upload-artifact@v4
      with:
        name: nb-windows-amd64
        path: target/x86_64-pc-windows-msvc/release/nb.exe
        retention-days: 30
